services:
  engine:
    restart: always
    build:
      context: engine
      dockerfile: Dockerfile
    image: syga-dev-engine:local
    container_name: syga-dev-engine
    ports:
      - ${ENGINE_PORT}:${ENGINE_PORT}
  webapp:
    build:
      context: webapp
      secrets:
        - webapp_github_token
    image: syga-dev-webapp:local
    container_name: syga-dev-webapp
    volumes:
      - dist:/app/dist:z
    develop:
      watch:
        - action: rebuild
          path: ./webapp/src/
    environment:
      VITE_SYGA_VERSION: 0.2.0-beta
  api:
    depends_on:
      - engine
    build:
      context: api
      secrets:
        - api_github_token
    image: syga-dev-api:local
    container_name: syga-dev-api
    environment:
      PORT: ${API_PORT}
    ports:
      - ${API_PORT}:${API_PORT}
    develop:
      watch:
        - action: rebuild
          path: ./api/src/
  nginx:
    depends_on:
      - webapp
      - api
    image: nginx:latest
    ports:
      - ${WEBAPP_PORT}:80
    volumes:
      - dist:/usr/shared/nginx/syga:roz
      - ./default.nginx.conf:/etc/nginx/conf.d/default.conf:roz
volumes:
  dist:

secrets:
  webapp_github_token:
    file: ./webapp_github_token.txt
  api_github_token:
    file: ./api_github_token.txt
